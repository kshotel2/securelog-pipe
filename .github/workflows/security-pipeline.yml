name: Security Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  security-scan:
    name: Security Scan & Detector Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Gitleaks 전체 히스토리 스캔을 위해

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pyyaml bandit

      - name: Python syntax check
        run: |
          python -m py_compile app/app.py
          python -m py_compile detector/detect.py
          python -m py_compile detector/alert.py
          python -m py_compile detector/index_to_elastic.py
          echo "[OK] Syntax check passed"

      - name: SAST - Bandit
        run: |
          mkdir -p reports
          bandit -r app/ detector/ \
            --severity-level medium \
            --confidence-level medium \
            -f txt \
            -o reports/bandit-report.txt \
            --exit-zero
          cat reports/bandit-report.txt

      - name: Secret Scan - Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t securelog-app:ci ./app

      - name: Container Scan - Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securelog-app:ci
          format: table
          exit-code: 0          # 취약점 발견 시에도 파이프라인 계속 진행 (결과 확인 목적)
          severity: CRITICAL,HIGH

      - name: Run Detector Test
        run: |
          mkdir -p reports
          python detector/detect.py detector/sample_access.log
          echo "[OK] Detector produced:"
          cat reports/detection_report.json

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            reports/detection_report.json
            reports/bandit-report.txt
          retention-days: 14
